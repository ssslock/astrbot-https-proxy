# config/dynamic.yml
http:
  routers:
    # Astrbot 路由 - 监听 6184 端口
    astrbot-router:
      rule: "Host(`111.231.16.98`)"  # 不需要 PathPrefix 了
      entryPoints:
        - astrbot-entry  # 使用专门的入口点
      service: astrbot-service
      tls: {}

    # Napcat 路由 - 监听 6098 端口
    napcat-router:
      rule: "Host(`111.231.16.98`)"  # 不需要 PathPrefix 了
      entryPoints:
        - napcat-entry  # 使用专门的入口点
      service: napcat-service
      tls: {}

  services:
    astrbot-service:
      loadBalancer:
        servers:
          - url: "http://127.0.0.1:6185"  # Astrbot 原端口

    napcat-service:
      loadBalancer:
        servers:
          - url: "http://127.0.0.1:6099"  # Napcat 原端口

tls:
  certificates:
    - certFile: /certs/your-server.crt
      keyFile: /certs/your-server.key
  stores:
    default:
      defaultCertificate:
        certFile: /certs/your-server.crt
        keyFile: /certs/your-server.key
