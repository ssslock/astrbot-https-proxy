# config/dynamic.yml
http:
  routers:
    # Astrbot 路由
    astrbot-router:
      rule: "Host(`111.231.16.98`) && PathPrefix(`/astrobot`)"  # 或者直接用根路径
      entryPoints:
        - websecure
      service: astrbot-service
      tls: {}

    # Napcat 路由
    napcat-router:
      rule: "Host(`111.231.16.98`) && PathPrefix(`/napcat`)"
      entryPoints:
        - websecure
      service: napcat-service
      tls: {}
      
  services:
    # 指向主机上运行的 Astrbot
    astrbot-service:
      loadBalancer:
        servers:
          - url: "http://127.0.0.1:6185"  # ⭐ 指向主机 IP + 实际端口

    # 指向主机上运行的 Napcat
    napcat-service:
      loadBalancer:
        servers:
          - url: "http://127.0.0.1:3000"  # ⭐ 指向主机 IP + 实际端口

tls:
  certificates:
    - certFile: /certs/your-server.crt
      keyFile: /certs/your-server.key
  stores:
    default:
      defaultCertificate:
        certFile: /certs/your-server.crt
        keyFile: /certs/your-server.key
