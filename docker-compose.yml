version: '3.8'

services:
  traefik:
    image: traefik:v3.0
    container_name: traefik
    restart: unless-stopped
    network_mode: "host"  # ⭐ 关键：使用 host 网络模式
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro  # 可选，如果不需要 Docker 发现可以去掉
      - ./config/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./config/dynamic.yml:/etc/traefik/dynamic/dynamic.yml:ro
      - ./certs:/certs:ro
    # 不需要 ports 映射，因为用了 host 网络
